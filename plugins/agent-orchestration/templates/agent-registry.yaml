# Agent Registry Configuration
# 오케스트레이터가 사용하는 에이전트 등록 정보

version: "1.0"

# ============================================
# Domain Agents (파일 소유권 있음)
# ============================================

domain_agents:
  datamodel-agent:
    tier: 1
    ownership:
      writable:
        - "/packages/db/schema.prisma"
        - "/packages/db/migrations/**"
        - "/packages/db/seed/**"
      readable:
        - "/packages/contracts/**"
      forbidden:
        - "/apps/**"
    triggers:
      - "DB 스키마 변경"
      - "모델 추가/수정"
      - "마이그레이션 필요"
    downstream:
      - contract-agent

  contract-agent:
    tier: 2
    ownership:
      writable:
        - "/packages/contracts/**"
      readable:
        - "/packages/db/generated/**"
      forbidden:
        - "/apps/**"
        - "/packages/db/schema.prisma"
    triggers:
      - "API 타입 정의"
      - "DTO 생성"
      - "공유 인터페이스"
    upstream:
      - datamodel-agent
    downstream:
      - api-agent
      - webapp-agent
      - admin-agent

  api-agent:
    tier: 3
    ownership:
      writable:
        - "/apps/api/**"
      readable:
        - "/packages/contracts/**"
        - "/packages/db/generated/**"
      forbidden:
        - "/apps/web/**"
        - "/apps/admin/**"
        - "/packages/db/schema.prisma"
    triggers:
      - "API 엔드포인트"
      - "백엔드 로직"
      - "서비스 구현"
    upstream:
      - contract-agent
    parallel_safe:
      - webapp-agent
      - admin-agent

  webapp-agent:
    tier: 3
    ownership:
      writable:
        - "/apps/web/**"
      readable:
        - "/packages/contracts/**"
        - "/packages/db/generated/**"
        - "/packages/ui/**"
      forbidden:
        - "/apps/api/**"
        - "/apps/admin/**"
        - "/packages/db/schema.prisma"
    triggers:
      - "프론트엔드 UI"
      - "웹 페이지"
      - "클라이언트 컴포넌트"
    upstream:
      - contract-agent
    parallel_safe:
      - api-agent
      - admin-agent

  admin-agent:
    tier: 3
    ownership:
      writable:
        - "/apps/admin/**"
      readable:
        - "/packages/contracts/**"
        - "/packages/db/generated/**"
        - "/packages/ui/**"
      forbidden:
        - "/apps/web/**"
        - "/apps/api/**"
    triggers:
      - "관리자 기능"
      - "대시보드"
      - "어드민 UI"
    upstream:
      - contract-agent
    parallel_safe:
      - api-agent
      - webapp-agent

  infra-agent:
    tier: 4
    ownership:
      writable:
        - "/infra/**"
        - "/.github/workflows/**"
        - "/docker-compose*.yml"
        - "/Dockerfile*"
      readable:
        - "/apps/**/package.json"
        - "/packages/**/package.json"
      forbidden:
        - "/apps/**/src/**"
        - "/packages/**/src/**"
    triggers:
      - "Docker 설정"
      - "CI/CD 파이프라인"
      - "배포 설정"
    parallel_safe:
      - all

# ============================================
# Knowledge Agents (자문 역할)
# ============================================

knowledge_agents:
  typescript-agent:
    expertise:
      - "복잡한 타입 정의"
      - "제네릭 패턴"
      - "유틸리티 타입"
      - "타입 가드"
      - "조건부 타입"
    triggers:
      - "타입 에러 해결"
      - "복잡한 제네릭"
      - "타입 추론 문제"

  nextjs-agent:
    expertise:
      - "App Router 패턴"
      - "Server Components"
      - "Server Actions"
      - "Route Handlers"
      - "Middleware"
      - "Caching 전략"
    triggers:
      - "Next.js 구조"
      - "SSR/SSG 결정"
      - "라우팅 패턴"

  nestjs-agent:
    expertise:
      - "Module 구조"
      - "DI 패턴"
      - "Guards/Interceptors"
      - "Pipes/Filters"
      - "Custom Decorators"
    triggers:
      - "NestJS 아키텍처"
      - "미들웨어 설계"
      - "DI 구성"

  prisma-agent:
    expertise:
      - "스키마 설계"
      - "복잡한 쿼리"
      - "관계 설정"
      - "마이그레이션 전략"
      - "성능 최적화"
    triggers:
      - "복잡한 DB 쿼리"
      - "N+1 문제"
      - "트랜잭션 처리"

  react-agent:
    expertise:
      - "훅 패턴"
      - "상태 관리"
      - "컴포넌트 설계"
      - "성능 최적화"
      - "에러 바운더리"
    triggers:
      - "React 패턴"
      - "커스텀 훅"
      - "상태 설계"

  tailwind-agent:
    expertise:
      - "반응형 디자인"
      - "다크모드"
      - "커스텀 설정"
      - "애니메이션"
      - "컴포넌트 스타일"
    triggers:
      - "UI 스타일링"
      - "레이아웃 설계"
      - "디자인 시스템"

  testing-agent:
    expertise:
      - "테스트 전략"
      - "유닛 테스트"
      - "통합 테스트"
      - "E2E 테스트"
      - "모킹 패턴"
    triggers:
      - "테스트 코드 작성"
      - "테스트 구조"
      - "커버리지 개선"

  auth-agent:
    expertise:
      - "JWT 전략"
      - "OAuth 통합"
      - "세션 관리"
      - "권한 설계"
      - "보안 패턴"
    triggers:
      - "인증 구현"
      - "권한 관리"
      - "토큰 전략"

  validation-agent:
    expertise:
      - "Zod 스키마"
      - "폼 검증"
      - "API 검증"
      - "에러 처리"
      - "타입 안전 검증"
    triggers:
      - "입력 검증"
      - "데이터 검증"
      - "스키마 정의"

  policy-agent:
    expertise:
      - "보안 취약점"
      - "코드 품질"
      - "의존성 감사"
      - "ESLint 규칙"
    triggers:
      - "코드 검증"
      - "보안 검사"
      - "품질 리뷰"
    mode: validation_only

# ============================================
# Execution Rules
# ============================================

execution_rules:
  parallel_groups:
    - [webapp-agent, admin-agent, api-agent]
    - [testing-agent, infra-agent]

  serial_chains:
    - datamodel-agent → contract-agent → [app-agents]
    - [app-agents] → testing-agent → policy-agent

  knowledge_agent_policy:
    mode: "on-demand"  # Domain Agent 요청 시 호출
    max_concurrent: 2
    timeout: 30s
